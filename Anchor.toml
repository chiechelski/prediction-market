[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
prediction_market = "C5QvWnGHeC6o7N68heWFKPvC35eggZ9Mrgqzj86WwrBv"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "127.0.0.1"
ledger = ".anchor/test-ledger"
rpc_port = 8899

[scripts]
# Run happy-path first (creates mint, config, allowlist), then edge-cases, then user-profile
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/prediction_market.ts tests/edge-cases.ts tests/user-profile.ts tests/parimutuel.ts"
