name: Web build

on:
  push:
    paths:
      - "app/web/**"
      - ".github/workflows/web-build.yml"
  pull_request:
    paths:
      - "app/web/**"
      - ".github/workflows/web-build.yml"

jobs:
  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install & build
        run: |
          yarn install --frozen-lockfile
          yarn build
